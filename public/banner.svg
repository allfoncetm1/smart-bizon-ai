<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0f0f2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow circles -->
  <circle cx="200" cy="200" r="300" fill="#7c3aed" opacity="0.08" filter="url(#blur)"/>
  <circle cx="1000" cy="430" r="250" fill="#a855f7" opacity="0.06" filter="url(#blur)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Left violet bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Top accent line -->
  <rect x="6" y="0" width="1194" height="2" fill="#7c3aed" opacity="0.4"/>

  <!-- Logo icon -->
  <rect x="80" y="195" width="64" height="64" rx="16" fill="url(#accent)"/>
  <polygon points="104,215 104,243 130,229" fill="white"/>

  <!-- Brand label -->
  <text x="160" y="220" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#a78bfa" letter-spacing="3">SMART BIZON AI</text>
  <text x="160" y="244" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" letter-spacing="1">Webinar Agent Platform</text>

  <!-- Main headline -->
  <text x="80" y="330" font-family="Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="-1">Умная аналитика</text>
  <text x="80" y="400" font-family="Arial, sans-serif" font-size="58" font-weight="800" fill="url(#accent)" letter-spacing="-1">ваших вебинаров</text>

  <!-- Subtitle -->
  <text x="80" y="455" font-family="Arial, sans-serif" font-size="22" fill="#9ca3af">AI скоринг лидов · Модерация чата · Telegram уведомления</text>

  <!-- CTA pill -->
  <rect x="80" y="490" width="220" height="48" rx="24" fill="url(#accent)"/>
  <text x="190" y="521" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">Начать бесплатно →</text>

  <!-- Domain -->
  <text x="1120" y="600" font-family="Arial, sans-serif" font-size="16" fill="#6b7280" text-anchor="end">smartbizon.online</text>

  <!-- Right side — stats cards -->
  <g transform="translate(780, 160)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="160" height="90" rx="12" fill="#1a1a2e" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">ГОРЯЧИХ ЛИДОВ</text>
    <text x="20" y="62" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#ef4444">142</text>
    <text x="20" y="80" font-family="Arial, sans-serif" font-size="11" fill="#22c55e">↑ 23% за вебинар</text>

    <!-- Card 2 -->
    <rect x="180" y="0" width="160" height="90" rx="12" fill="#1a1a2e" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" transform="translate(180,0)">КОНВЕРСИЯ</text>
    <text x="200" y="62" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#a855f7">8.4%</text>
    <text x="200" y="80" font-family="Arial, sans-serif" font-size="11" fill="#22c55e">↑ из зрителей</text>

    <!-- Card 3 -->
    <rect x="0" y="110" width="160" height="90" rx="12" fill="#1a1a2e" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="20" y="140" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">ЗРИТЕЛЕЙ</text>
    <text x="20" y="172" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#60a5fa">1 689</text>
    <text x="20" y="190" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">последний вебинар</text>

    <!-- Card 4 -->
    <rect x="180" y="110" width="160" height="90" rx="12" fill="#1a1a2e" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
    <text x="200" y="140" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">AI РЕЗЮМЕ</text>
    <text x="200" y="172" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#22c55e">✓</text>
    <text x="200" y="190" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">авто-генерация</text>

    <!-- Mini bar chart -->
    <rect x="0" y="230" width="340" height="160" rx="12" fill="#1a1a2e" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <text x="20" y="258" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Лиды по вебинарам</text>
    <!-- bars -->
    <rect x="30" y="320" width="30" height="50" rx="4" fill="#7c3aed" opacity="0.5"/>
    <rect x="75" y="300" width="30" height="70" rx="4" fill="#7c3aed" opacity="0.6"/>
    <rect x="120" y="280" width="30" height="90" rx="4" fill="#7c3aed" opacity="0.7"/>
    <rect x="165" y="295" width="30" height="75" rx="4" fill="#7c3aed" opacity="0.65"/>
    <rect x="210" y="270" width="30" height="100" rx="4" fill="#7c3aed" opacity="0.8"/>
    <rect x="255" y="255" width="30" height="115" rx="4" fill="url(#accent)"/>
    <!-- hot leads overlay -->
    <rect x="30" y="340" width="30" height="30" rx="4" fill="#ef4444" opacity="0.8"/>
    <rect x="75" y="330" width="30" height="40" rx="4" fill="#ef4444" opacity="0.8"/>
    <rect x="120" y="315" width="30" height="55" rx="4" fill="#ef4444" opacity="0.8"/>
    <rect x="165" y="322" width="30" height="48" rx="4" fill="#ef4444" opacity="0.8"/>
    <rect x="210" y="305" width="30" height="65" rx="4" fill="#ef4444" opacity="0.8"/>
    <rect x="255" y="290" width="30" height="80" rx="4" fill="#ef4444" opacity="0.9"/>
  </g>

  <!-- Bottom border -->
  <rect x="0" y="628" width="1200" height="2" fill="#7c3aed" opacity="0.3"/>
</svg>
