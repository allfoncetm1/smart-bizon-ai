services:
  - type: web
    name: smart-bizon-ai
    env: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-bizon-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: BIZON365_API_BASE
        value: https://online.bizon365.ru/api/v2
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: CRON_SECRET
        value: smart-bizon-cron-2026

databases:
  - name: smart-bizon-db
    plan: free
    region: frankfurt
    databaseName: smart_bizon
